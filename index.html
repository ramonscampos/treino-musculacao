<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iron Protocol</title>
    <meta name="description" content="Rastreador pessoal de treino de musculação">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iron Protocol">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.08);
            --accent: #d1ff4e;
            --accent-glow: rgba(209,255,78,0.25);
            --accent-dim: rgba(209,255,78,0.12);
            --text: #ffffff;
            --text-sec: #a1a1aa;
            --text-muted: #52525b;
            --success: #4eff88;
            --rest: #3f3f46;
            --ease: all 0.3s cubic-bezier(0.4,0,0.2,1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Inter',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100dvh;
            padding-bottom:calc(2rem + var(--safe-bot));
            -webkit-font-smoothing:antialiased;
        }
        h1,h2,h3 { font-family:'Outfit',sans-serif; }
        .container { max-width:600px; margin:0 auto; padding:1.25rem; padding-top:calc(1.25rem + var(--safe-top)); }

        /* ─── HEADER ─── */
        header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:1.25rem;
        }
        .header-left .brand {
            font-size:0.65rem;
            text-transform:uppercase;
            letter-spacing:0.2rem;
            color:var(--accent);
            font-weight:700;
        }
        .header-left h1 { font-size:1.6rem; font-weight:700; letter-spacing:-0.02em; }
        .header-right { display:flex; align-items:center; gap:0.75rem; }

        /* streak pill */
        .streak-pill {
            display:flex;
            align-items:baseline;
            gap:0.35rem;
            background:var(--accent-dim);
            border:1px solid rgba(209,255,78,0.25);
            border-radius:2rem;
            padding:0.45rem 0.85rem;
        }
        .streak-num {
            font-family:'Outfit',sans-serif;
            font-size:1.5rem;
            font-weight:700;
            color:var(--accent);
            line-height:1;
        }
        .streak-unit { font-size:0.65rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05rem; }

        /* dashboard button */
        .btn-dash {
            width:38px; height:38px;
            border-radius:50%;
            border:1px solid var(--card-border);
            background:var(--card-bg);
            color:var(--text-sec);
            font-size:1rem;
            cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:var(--ease);
        }
        .btn-dash:hover { border-color:var(--accent); color:var(--accent); }

        /* ─── WEEK RING CARD ─── */
        .week-ring-card {
            background:var(--card-bg);
            border:1px solid var(--card-border);
            border-radius:1.25rem;
            padding:1rem 1.25rem;
            margin-bottom:1rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:0.25rem;
        }
        .ring-day {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:0.35rem;
            flex:1;
        }
        .ring-label {
            font-size:0.55rem;
            font-weight:700;
            text-transform:uppercase;
            color:var(--text-muted);
            letter-spacing:0.05rem;
        }
        .ring-circle {
            width:36px; height:36px;
            border-radius:50%;
            border:2px solid var(--card-border);
            display:flex; align-items:center; justify-content:center;
            font-size:0.6rem;
            font-weight:700;
            color:var(--text-muted);
            transition:var(--ease);
            position:relative;
        }
        .ring-circle.trained {
            background:var(--accent);
            border-color:var(--accent);
            color:#000;
            box-shadow:0 0 12px var(--accent-glow);
        }
        .ring-circle.today {
            border-color:var(--accent);
            color:var(--accent);
        }
        .ring-circle.trained.today { color:#000; }
        .ring-circle.rest-day {
            border-color:var(--rest);
            color:var(--rest);
            font-size:0.75rem;
        }
        .ring-circle.rest-day.today {
            border-color:var(--text-sec);
            color:var(--text-sec);
        }

        /* ─── TABS ─── */
        .tabs-container {
            position:sticky;
            top:calc(0.4rem + var(--safe-top));
            z-index:100;
            background:rgba(10,10,12,0.85);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            padding:0.35rem;
            border-radius:1rem;
            border:1px solid var(--card-border);
            display:flex;
            gap:0.15rem;
            overflow-x:auto;
            scrollbar-width:none;
            margin-bottom:1rem;
        }
        .tabs-container::-webkit-scrollbar { display:none; }
        .tab {
            padding:0.5rem 0.75rem;
            border-radius:0.65rem;
            cursor:pointer;
            font-size:0.8rem;
            font-weight:600;
            white-space:nowrap;
            color:var(--text-sec);
            transition:var(--ease);
            flex:1;
            text-align:center;
            border:none;
            background:transparent;
            position:relative;
        }
        .tab.active { background:var(--accent); color:#000; }
        .tab.done-today::after {
            content:'';
            position:absolute;
            top:4px; right:4px;
            width:5px; height:5px;
            border-radius:50%;
            background:var(--success);
        }
        .tab.active.done-today::after { background:#000; }

        /* ─── CONTENT CARD ─── */
        .content-card {
            background:var(--card-bg);
            border:1px solid var(--card-border);
            border-radius:1.5rem;
            padding:1.25rem;
            animation:fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .day-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:1.1rem; gap:0.75rem; flex-wrap:wrap;
        }
        .day-title {
            font-size:1rem; font-weight:700;
            display:flex; align-items:center; gap:0.6rem;
        }
        .day-title::before {
            content:''; display:inline-block;
            width:3px; height:1rem;
            background:var(--accent); border-radius:2px;
            box-shadow:0 0 8px var(--accent-glow); flex-shrink:0;
        }

        .btn-complete {
            padding:0.45rem 0.9rem;
            border-radius:0.65rem;
            border:1.5px solid var(--accent);
            background:transparent;
            color:var(--accent);
            font-size:0.78rem; font-weight:700;
            font-family:'Inter',sans-serif;
            cursor:pointer;
            transition:var(--ease);
            display:flex; align-items:center; gap:0.35rem;
            white-space:nowrap;
        }
        .btn-complete:active { transform:scale(0.96); }
        .btn-complete:hover, .btn-complete:active { background:var(--accent); color:#000; }
        .btn-complete.completed {
            background:rgba(78,255,136,0.1);
            border-color:var(--success);
            color:var(--success);
        }
        .btn-complete.completed:hover { background:rgba(255,78,78,0.1); border-color:#ff4e4e; color:#ff4e4e; }

        /* ─── EXERCISES ─── */
        .exercise-list { display:flex; flex-direction:column; gap:0.6rem; }
        .exercise-item {
            padding:0.9rem 1rem;
            background:rgba(255,255,255,0.02);
            border:1px solid var(--card-border);
            border-radius:0.85rem;
            display:flex; flex-direction:column; gap:0.5rem;
            transition:var(--ease);
        }
        .exercise-header { display:flex; justify-content:space-between; align-items:flex-start; gap:0.75rem; }
        .exercise-name { font-weight:600; font-size:0.9rem; line-height:1.3; }
        .exercise-sets { font-family:'Outfit',sans-serif; font-weight:700; color:var(--accent); font-size:0.88rem; white-space:nowrap; }
        .exercise-meta { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
        .rest-badge { background:rgba(255,255,255,0.05); padding:0.15rem 0.5rem; border-radius:0.4rem; color:var(--text-sec); font-size:0.72rem; }
        .note { font-style:italic; color:var(--text-muted); font-size:0.72rem; }

        .load-row { display:flex; align-items:center; gap:0.5rem; }
        .load-label { font-size:0.72rem; color:var(--text-muted); font-weight:500; white-space:nowrap; }
        .load-prev { font-size:0.68rem; color:var(--text-muted); padding:0.2rem 0.5rem; background:rgba(255,255,255,0.04); border-radius:0.35rem; flex-shrink:0; }
        .load-prev span { color:var(--accent); font-weight:600; }
        .load-input-wrap { display:flex; align-items:center; gap:0.3rem; margin-left:auto; }
        .load-input {
            width:76px; padding:0.28rem 0.45rem;
            background:rgba(255,255,255,0.06);
            border:1px solid var(--card-border);
            border-radius:0.45rem;
            color:var(--text);
            font-size:0.85rem; font-family:'Outfit',sans-serif; font-weight:600;
            text-align:center; transition:var(--ease);
            -moz-appearance:textfield;
        }
        .load-input:focus { outline:none; border-color:var(--accent); background:rgba(209,255,78,0.05); box-shadow:0 0 0 2px rgba(209,255,78,0.1); }
        .load-input::-webkit-outer-spin-button,.load-input::-webkit-inner-spin-button { -webkit-appearance:none; }
        .load-unit { font-size:0.7rem; color:var(--text-muted); }

        .extra-info {
            margin-top:1rem; padding:0.75rem 1rem;
            border-radius:0.85rem;
            background:rgba(209,255,78,0.04);
            border:1px dashed rgba(209,255,78,0.3);
            font-size:0.82rem; color:var(--accent);
            display:flex; align-items:center; gap:0.6rem;
        }
        .empty-state { text-align:center; padding:2rem 0; color:var(--text-muted); font-size:0.9rem; }

        /* ─── TOAST ─── */
        .toast {
            position:fixed;
            bottom:calc(1.5rem + var(--safe-bot));
            left:50%; transform:translateX(-50%) translateY(80px);
            background:rgba(25,25,30,0.95);
            border:1px solid var(--card-border);
            border-radius:0.85rem;
            padding:0.65rem 1.1rem;
            font-size:0.82rem; font-weight:500;
            backdrop-filter:blur(16px);
            z-index:9999;
            transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
            white-space:nowrap; pointer-events:none;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        /* ─── DASHBOARD OVERLAY ─── */
        .dash-overlay {
            position:fixed; inset:0; z-index:500;
            background:rgba(0,0,0,0);
            pointer-events:none;
            transition:background 0.35s ease;
            display:flex; align-items:flex-end;
        }
        .dash-overlay.open { background:rgba(0,0,0,0.7); pointer-events:all; }
        .dash-panel {
            width:100%; max-height:92dvh;
            background:#111114;
            border-radius:1.5rem 1.5rem 0 0;
            border-top:1px solid var(--card-border);
            padding:1.5rem;
            padding-bottom:calc(1.5rem + var(--safe-bot));
            overflow-y:auto;
            transform:translateY(100%);
            transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .dash-overlay.open .dash-panel { transform:translateY(0); }

        .dash-handle {
            width:40px; height:4px;
            background:rgba(255,255,255,0.15);
            border-radius:2px;
            margin:0 auto 1.5rem;
        }
        .dash-title {
            font-size:1.3rem; font-weight:700;
            margin-bottom:1.5rem;
            display:flex; align-items:center; gap:0.5rem;
        }

        /* stats grid */
        .stats-grid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:0.75rem; margin-bottom:1.5rem;
        }
        .stat-card {
            background:var(--card-bg);
            border:1px solid var(--card-border);
            border-radius:1rem;
            padding:1rem;
        }
        .stat-card.accent { background:var(--accent-dim); border-color:rgba(209,255,78,0.25); }
        .stat-card.full { grid-column:1/-1; }
        .stat-value { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:700; color:var(--text); line-height:1; }
        .stat-card.accent .stat-value { color:var(--accent); }
        .stat-label { font-size:0.7rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.08rem; margin-top:0.35rem; }

        /* week summary dots in dashboard */
        .dash-week { display:flex; gap:0.5rem; align-items:center; margin-bottom:1.5rem; }
        .dash-week-day { flex:1; height:6px; border-radius:3px; background:rgba(255,255,255,0.07); transition:var(--ease); }
        .dash-week-day.done { background:var(--accent); }
        .dash-week-day.today { background:rgba(209,255,78,0.4); }

        /* load chart */
        .dash-section-title {
            font-size:0.65rem; font-weight:700;
            text-transform:uppercase; letter-spacing:0.12rem;
            color:var(--text-muted); margin-bottom:0.75rem;
        }
        .load-chart-item { margin-bottom:1rem; }
        .load-chart-name { font-size:0.82rem; font-weight:600; margin-bottom:0.4rem; }
        .load-bars { display:flex; align-items:flex-end; gap:0.3rem; height:40px; }
        .load-bar-col { display:flex; flex-direction:column; align-items:center; gap:0.2rem; flex:1; }
        .load-bar-fill { width:100%; background:var(--accent); border-radius:3px 3px 0 0; min-height:3px; opacity:0.85; }
        .load-bar-lbl { font-size:0.52rem; color:var(--text-muted); white-space:nowrap; }

        /* history log in dashboard */
        .hist-entry {
            display:flex; align-items:center; justify-content:space-between;
            padding:0.65rem 0.85rem;
            background:rgba(255,255,255,0.02);
            border:1px solid var(--card-border);
            border-radius:0.7rem;
            margin-bottom:0.4rem;
        }
        .hist-left { display:flex; align-items:center; gap:0.6rem; }
        .hist-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
        .hist-date { font-size:0.8rem; font-weight:600; }
        .hist-sub { font-size:0.7rem; color:var(--text-muted); }
        .hist-badge {
            font-size:0.65rem; font-weight:700;
            padding:0.15rem 0.5rem;
            background:rgba(209,255,78,0.1);
            border:1px solid rgba(209,255,78,0.25);
            color:var(--accent); border-radius:0.4rem;
        }

        .empty-dash { text-align:center; padding:2rem; color:var(--text-muted); font-size:0.82rem; }

        @media(max-width:480px) {
            .container { padding:1rem; padding-top:calc(1rem + var(--safe-top)); }
            .content-card { padding:1rem; }
            .ring-circle { width:32px; height:32px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="brand">Iron Protocol</div>
            <h1>Meu Treino</h1>
        </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- DASHBOARD OVERLAY -->
<div class="dash-overlay" id="dash-overlay" onclick="closeDashOnBackdrop(event)">

</div>

<script>
// ─── STORAGE ───────────────────────────────────────────────────────
const STORE = 'iron_v2';
function load() {
    try { return JSON.parse(localStorage.getItem(STORE)) || { history:[], loads:{} }; }
    catch { return { history:[], loads:{} }; }
}
function save(d) { localStorage.setItem(STORE, JSON.stringify(d)); }

// ─── DATE HELPERS ──────────────────────────────────────────────────
function toStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return toStr(new Date()); }
function fmtDate(s) { const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

// ─── STREAK: consecutive workout days, skipping Sundays (DOM=rest)
// Rule: 1 unplanned miss per calendar week is forgiven.
function calcStreak(history) {
    const trained = new Set(history.filter(e => e.day !== 'DOM').map(e => e.date));
    const today = new Date(); today.setHours(0,0,0,0);

    let streak = 0;
    let weekMissUsed = {}; // weekKey → bool

    function isoWeek(d) {
        const tmp = new Date(d); tmp.setHours(0,0,0,0);
        tmp.setDate(tmp.getDate() + 4 - (tmp.getDay()||7));
        const y = tmp.getFullYear();
        const w = Math.ceil((((tmp - new Date(y,0,1))/86400000)+1)/7);
        return `${y}-W${w}`;
    }

    for (let i = 0; i < 400; i++) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        const ds = toStr(d);
        const dow = d.getDay(); // 0=Sun

        if (dow === 0) continue; // Sunday = rest, skip without breaking

        if (trained.has(ds)) {
            streak++;
        } else {
            // today hasn't passed yet — don't penalize
            if (i === 0) break;
            // use the weekly forgiveness
            const wk = isoWeek(d);
            if (!weekMissUsed[wk]) {
                weekMissUsed[wk] = true;
                // forgiven — don't count the day, don't break
            } else {
                break; // streak ends
            }
        }
    }
    return streak;
}

// ─── WORKOUT DATA ─────────────────────────────────────────────────
const WD = JSON.parse(document.getElementById('workout-data').textContent);
// dayMap index matches JS getDay(): 0=Sun=DOM
const DAY_MAP = ['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
const DAY_LABELS = { DOM:'Dom', SEG:'Seg', TER:'Ter', QUA:'Qua', QUI:'Qui', SEX:'Sex', SAB:'Sáb' };

let currentDay = DAY_MAP[new Date().getDay()];

// ─── WEEK RING CARD ───────────────────────────────────────────────
function renderWeekRing() {
    const d = load();
    const todayDs = todayStr();
    const todayDow = new Date().getDay(); // 0-6

    // Get this week Mon–Sun (or Sun–Sat depending on perspective)
    // We'll show the current 7 days: Mon–Sun of this week
    const now = new Date(); now.setHours(0,0,0,0);
    // Find Monday of current week
    const dayOfWeek = now.getDay(); // 0=Sun
    const offsetToMon = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
    const monday = new Date(now); monday.setDate(now.getDate() + offsetToMon);

    const ring = document.getElementById('week-ring');
    ring.innerHTML = '';

    // Mon=1..Sun=0 → we'll iterate Mon to Sun
    const order = [1,2,3,4,5,6,0]; // Mon..Sat..Sun
    const orderKeys = ['SEG','TER','QUA','QUI','SEX','SAB','DOM'];

    order.forEach((dow, idx) => {
        const dayDate = new Date(monday); dayDate.setDate(monday.getDate() + idx);
        const ds = toStr(dayDate);
        const key = orderKeys[idx];
        const isToday = ds === todayDs;
        const isRest = key === 'DOM';
        const wasTrained = d.history.some(e => e.date === ds && e.day === key);

        let circleClass = 'ring-circle';
        if (isRest) circleClass += ' rest-day';
        if (wasTrained) circleClass += ' trained';
        if (isToday) circleClass += ' today';

        const inner = isRest ? '—' : dayDate.getDate();

        const col = document.createElement('div');
        col.className = 'ring-day';
        col.innerHTML = `
            <div class="ring-label">${DAY_LABELS[key]}</div>
            <div class="${circleClass}">${inner}</div>
        `;
        ring.appendChild(col);
    });
}

// ─── TABS ─────────────────────────────────────────────────────────
function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = '';
    const d = load();
    const todayDs = todayStr();
    const trainedToday = new Set(d.history.filter(e => e.date === todayDs).map(e => e.day));

    DAY_MAP.forEach(day => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (currentDay === day ? ' active' : '');
        btn.textContent = DAY_LABELS[day];
        btn.id = `tab-${day}`;
        if (trainedToday.has(day)) btn.classList.add('done-today');
        btn.onclick = () => { currentDay = day; render(); };
        tabs.appendChild(btn);
    });
}

// ─── WORKOUT VIEW ─────────────────────────────────────────────────
function isTodayDone(day) {
    return load().history.some(e => e.date === todayStr() && e.day === day);
}
function getLastLoad(name) {
    const entries = load().loads[name] || [];
    return entries.length ? entries[entries.length-1] : null;
}
function saveLoad(name, val) {
    if (!val.trim()) return;
    const d = load();
    if (!d.loads[name]) d.loads[name] = [];
    const td = todayStr();
    const idx = d.loads[name].findIndex(e => e.date === td);
    const entry = { date: td, value: val.trim() };
    if (idx >= 0) d.loads[name][idx] = entry; else d.loads[name].push(entry);
    save(d);
}
function toggleDone(day) {
    const d = load();
    const td = todayStr();
    const idx = d.history.findIndex(e => e.date === td && e.day === day);
    if (idx >= 0) { d.history.splice(idx,1); toast('Treino desmarcado'); }
    else { d.history.push({ date:td, day }); toast('✅ Treino concluído!'); }
    save(d);
    render();
}

function renderWorkout() {
    const day = currentDay;
    const data = WD[day];
    const done = isTodayDone(day);
    const main = document.getElementById('main-content');

    let html = `<div class="content-card"><div class="day-header">
        <h2 class="day-title">${data.title}</h2>`;
    if (data.exercises.length) {
        html += `<button class="btn-complete ${done ? 'completed' : ''}" onclick="toggleDone('${day}')">
            ${done ? '✓ Concluído' : '+ Concluir'}
        </button>`;
    }
    html += `</div><div class="exercise-list">`;

    if (!data.exercises.length) {
        html += `<div class="empty-state">Descanso programado. Aproveite! 🧘</div>`;
    } else {
        data.exercises.forEach((ex, i) => {
            const last = getLastLoad(ex.name);
            const safeName = ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            html += `<div class="exercise-item">
                <div class="exercise-header">
                    <span class="exercise-name">${ex.name}</span>
                    <span class="exercise-sets">${ex.sets}</span>
                </div>
                <div class="exercise-meta">
                    ${ex.rest ? `<span class="rest-badge">⏱ ${ex.rest}</span>` : ''}
                    ${ex.note ? `<span class="note">${ex.note}</span>` : ''}
                </div>
                <div class="load-row">
                    <span class="load-label">Carga</span>
                    ${last ? `<span class="load-prev">ant: <span>${last.value} kg</span></span>` : ''}
                    <div class="load-input-wrap">
                        <input class="load-input" type="text" inputmode="decimal" placeholder="—"
                            onchange="saveLoad('${safeName}',this.value)"
                            onblur="saveLoad('${safeName}',this.value)">
                        <span class="load-unit">kg</span>
                    </div>
                </div>
            </div>`;
        });
    }
    html += `</div>`;
    if (data.extra) html += `<div class="extra-info"><span>✨</span><span>${data.extra}</span></div>`;
    html += `</div>`;
    main.innerHTML = html;
    document.getElementById(`tab-${day}`)?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ─── DASHBOARD ────────────────────────────────────────────────────
function openDash() {
    buildDash();
    document.getElementById('dash-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeDash() {
    document.getElementById('dash-overlay').classList.remove('open');
    document.body.style.overflow = '';
}
function closeDashOnBackdrop(e) {
    if (e.target === document.getElementById('dash-overlay')) closeDash();
}

function buildDash() {
    const d = load();
    const history = d.history;
    const streak = calcStreak(history);

    // This week sessions (Mon–Sun)
    const now = new Date(); now.setHours(0,0,0,0);
    const dow = now.getDay();
    const offsetToMon = (dow === 0) ? -6 : 1 - dow;
    const monday = new Date(now); monday.setDate(now.getDate() + offsetToMon);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

    let thisWeekSessions = 0;
    const weekBars = [];
    for (let i=0;i<7;i++) {
        const d2 = new Date(monday); d2.setDate(monday.getDate()+i);
        const ds = toStr(d2);
        const isToday = ds === todayStr();
        const done = history.some(e => e.date === ds);
        if (done) thisWeekSessions++;
        weekBars.push({ ds, done, isToday });
    }

    const totalSessions = history.length;
    const totalLoads = Object.values(d.loads).reduce((a,v)=>a+v.length,0);

    // Best streak (reuse same logic but across all history)
    const bestStreak = calcBestStreak(history);

    // Load charts (exercises with ≥2 entries)
    const significantLoads = Object.entries(d.loads)
        .filter(([,v])=>v.length>=2)
        .slice(0,4);

    // Recent log
    const recent = [...history].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

    let html = ``;

    // Week bars
    html += `<div class="dash-week">`;
    weekBars.forEach(b => {
        let cls = 'dash-week-day';
        if (b.done) cls += ' done';
        else if (b.isToday) cls += ' today';
        html += `<div class="${cls}" title="${fmtDate(b.ds)}"></div>`;
    });
    html += `</div>`;

    // Stats grid
    html += `<div class="stats-grid">
        <div class="stat-card accent">
            <div class="stat-value">${streak}</div>
            <div class="stat-label">Dias seguidos</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${thisWeekSessions}</div>
            <div class="stat-label">Treinos esta semana</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${bestStreak}</div>
            <div class="stat-label">Melhor sequência</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${totalSessions}</div>
            <div class="stat-label">Total de treinos</div>
        </div>
    </div>`;

    // Load progress
    if (significantLoads.length) {
        html += `<div class="dash-section-title">Evolução de cargas</div>`;
        significantLoads.forEach(([name, entries]) => {
            const last5 = entries.slice(-5);
            const nums = last5.map(e=>parseFloat(e.value)||0);
            const maxV = Math.max(...nums, 1);
            const bars = last5.map(e=>{
                const h = Math.max(3, Math.round((parseFloat(e.value)/maxV)*40));
                return `<div class="load-bar-col">
                    <div class="load-bar-fill" style="height:${h}px"></div>
                    <div class="load-bar-lbl">${e.value}</div>
                </div>`;
            }).join('');
            html += `<div class="load-chart-item">
                <div class="load-chart-name">${name}</div>
                <div class="load-bars">${bars}</div>
            </div>`;
        });
    }

    // History log
    if (recent.length) {
        html += `<div class="dash-section-title" style="margin-top:1.25rem">Histórico recente</div>`;
        recent.forEach(e => {
            const title = WD[e.day]?.title || e.day;
            html += `<div class="hist-entry">
                <div class="hist-left">
                    <div class="hist-dot"></div>
                    <div>
                        <div class="hist-date">${fmtDate(e.date)}</div>
                        <div class="hist-sub">${title}</div>
                    </div>
                </div>
                <div class="hist-badge">${e.day}</div>
            </div>`;
        });
    } else {
        html += `<div class="empty-dash">Nenhum treino registrado ainda.<br>Marque como concluído ao terminar!</div>`;
    }

    document.getElementById('dash-content').innerHTML = html;
}

function calcBestStreak(history) {
    // Simplified: just find the longest run in the recorded history
    if (!history.length) return 0;
    const trained = new Set(history.filter(e=>e.day!=='DOM').map(e=>e.date));
    const dates = [...trained].sort();
    let best = 1, cur = 1;
    for (let i=1;i<dates.length;i++) {
        const prev = new Date(dates[i-1]); prev.setHours(0,0,0,0);
        const curr = new Date(dates[i]); curr.setHours(0,0,0,0);
        const diff = Math.round((curr-prev)/86400000);
        // 1 day apart or 2 days apart skipping Sunday
        if (diff === 1 || (diff === 2 && new Date(dates[i]).getDay() === 1)) {
            cur++;
            if (cur > best) best = cur;
        } else { cur = 1; }
    }
    return best;
}

// ─── TOAST ────────────────────────────────────────────────────────
let tTimer;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(tTimer);
    tTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
    renderWeekRing();
    renderTabs();
    renderWorkout();
    // streak
    const streak = calcStreak(load().history);
    document.getElementById('streak-num').textContent = streak;
}

// ─── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

render();
</script>
